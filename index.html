<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ankit Sunil Gupta — Business Development Manager, APAC</title>
  <meta name="description" content="Business Development Manager – APAC at WeTransact. Save my contact, message me on LinkedIn or WhatsApp, email me, or book a meeting." />
  <meta name="theme-color" content="#F4C82E" />

  <meta property="og:title" content="Ankit Sunil Gupta — WeTransact" />
  <meta property="og:description" content="Business Development Manager, APAC. Tap to connect." />
  <meta property="og:type" content="profile" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --yellow: #F4C82E;
      --yellow-deep: #E8B81C;
      --yellow-soft: #FCF0B8;
      --ink: #0F0F0F;
      --ink-2: #2B2B2B;
      --ink-3: #6E6E6E;
      --ink-4: #9A9A9A;
      --line: #ECE7D5;
      --card: #FFFFFF;
      --cream: #FFFDF6;
      --accent: #C73E1D;
      --shadow-sm: 0 1px 2px rgba(15,15,15,0.04), 0 1px 1px rgba(15,15,15,0.03);
      --shadow-md: 0 4px 12px rgba(15,15,15,0.06), 0 2px 4px rgba(15,15,15,0.04);
      --shadow-lg: 0 24px 48px -12px rgba(15,15,15,0.18), 0 8px 16px -8px rgba(15,15,15,0.08);
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--yellow);
      color: var(--ink);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.005em;
    }

    /* subtle pattern on page bg */
    body {
      background-image:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.35) 0%, transparent 35%),
        radial-gradient(circle at 80% 90%, rgba(231,184,28,0.4) 0%, transparent 40%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 18px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      position: relative;
      animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top banner with yellow accent */
    .banner {
      height: 72px;
      background: var(--yellow);
      background-image:
        radial-gradient(circle at 0% 100%, rgba(255,255,255,0.3) 0%, transparent 50%),
        radial-gradient(circle at 100% 0%, rgba(231,184,28,0.5) 0%, transparent 50%);
      position: relative;
    }

    .banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(135deg, transparent 40%, rgba(15,15,15,0.04) 100%);
    }

    .brand {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0.7;
    }

    .corner-dot {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ink);
      opacity: 0.6;
      box-shadow: 14px 0 0 rgba(15,15,15,0.6), 28px 0 0 rgba(15,15,15,0.6);
    }

    /* Header — photo + name */
    .head {
      padding: 0 28px 20px;
      text-align: center;
      position: relative;
    }

    .avatar-wrap {
      width: 96px;
      height: 96px;
      margin: -48px auto 14px;
      position: relative;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--yellow-soft);
      border: 4px solid var(--card);
      box-shadow: var(--shadow-md);
      display: block;
    }

    .avatar-fallback {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--yellow) 0%, var(--yellow-deep) 100%);
      border: 4px solid var(--card);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 36px;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .status-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #22C55E;
      border: 3px solid var(--card);
      box-shadow: 0 0 0 1px rgba(15,15,15,0.05);
    }

    .name {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .title {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-3);
      margin-bottom: 4px;
    }

    .org {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      padding: 4px 10px;
      background: var(--yellow-soft);
      border-radius: 999px;
      margin-top: 4px;
    }

    .org::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink);
    }

    /* Contact rows */
    .rows {
      padding: 4px 16px 8px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 12px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--ink);
      transition: background 0.18s ease, transform 0.18s ease;
      position: relative;
    }

    .row + .row {
      border-top: 1px solid var(--line);
    }

    .row:hover, .row:focus-visible {
      background: var(--cream);
      outline: none;
    }

    .row:active { transform: scale(0.985); }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }

    .icon svg { width: 20px; height: 20px; }

    .icon.li { background: #0A66C2; }
    .icon.em { background: #1A1A1A; }
    .icon.wa { background: #25D366; }
    .icon.bk { background: #6366F1; }

    .icon.li svg, .icon.em svg, .icon.wa svg, .icon.bk svg { fill: white; }

    .row-text {
      flex: 1;
      min-width: 0;
    }

    .row-text .primary {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
    }

    .row-text .secondary {
      font-size: 12.5px;
      font-weight: 400;
      color: var(--ink-3);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chevron {
      color: var(--ink-4);
      flex-shrink: 0;
      transition: transform 0.18s ease, color 0.18s ease;
    }

    .row:hover .chevron, .row:focus-visible .chevron {
      transform: translateX(3px);
      color: var(--ink-2);
    }

    /* Save-to-contacts CTA */
    .save {
      margin: 6px 16px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 18px;
      background: var(--ink);
      color: var(--yellow);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border-radius: 14px;
      transition: background 0.18s ease, transform 0.18s ease;
      letter-spacing: 0.01em;
    }

    .save:hover, .save:focus-visible {
      background: var(--ink-2);
      transform: translateY(-1px);
      outline: none;
    }

    .save:active { transform: translateY(0); }

    .save svg { width: 16px; height: 16px; stroke: var(--yellow); }

    /* Footer */
    .foot {
      padding: 14px 28px 22px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--ink-4);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .foot .left { display: flex; align-items: center; gap: 6px; }
    .foot .left::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--yellow);
    }

    /* Bigger screens — refine spacing */
    @media (min-width: 480px) {
      .card { border-radius: 32px; }
      .head { padding-bottom: 24px; }
      .rows { padding: 4px 20px 8px; }
      .save { margin: 6px 20px 26px; }
    }

    @media (max-width: 360px) {
      .name { font-size: 23px; }
      .avatar, .avatar-fallback, .avatar-wrap { width: 84px; height: 84px; }
      .avatar-wrap { margin-top: -42px; }
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
