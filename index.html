<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ankit Sunil Gupta — Let's connect</title>
  <meta name="description" content="Business Development Manager – APAC at WeTransact. Connect with me on LinkedIn, WhatsApp, email, or book a meeting." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow: #F5D93B;
      --yellow-soft: #FBE57A;
      --ink: #1A1A1A;
      --ink-soft: #3A3A3A;
      --card: #FFFFFF;
      --shadow: 0 8px 24px rgba(26, 26, 26, 0.08);
      --shadow-hover: 0 12px 32px rgba(26, 26, 26, 0.14);
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--yellow);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 20px 48px;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .photo {
      width: 168px;
      height: 168px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--yellow-soft);
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.5), var(--shadow);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 6px;
    }

    .title {
      font-size: 15px;
      font-weight: 500;
      color: var(--ink-soft);
      text-align: center;
      margin-bottom: 4px;
    }

    .company {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      text-align: center;
      margin-bottom: 28px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--card);
      border-radius: 14px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 600;
      font-size: 16px;
      box-shadow: var(--shadow);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border: none;
      cursor: pointer;
    }

    .btn:hover, .btn:focus-visible {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      outline: none;
    }

    .btn:active { transform: translateY(0); }

    .btn .icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn .label {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    .btn .label .primary { font-size: 16px; font-weight: 600; }
    .btn .label .secondary { font-size: 13px; font-weight: 400; color: var(--ink-soft); margin-top: 2px; word-break: break-all; }

    .btn .arrow {
      color: #A0A0A0;
      flex-shrink: 0;
    }

    .icon.linkedin { background: #0A66C2; }
    .icon.email    { background: #1A1A1A; }
    .icon.whatsapp { background: #25D366; }
    .icon.book     { background: #6366F1; }

    .icon svg { width: 22px; height: 22px; fill: white; }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: var(--ink-soft);
      text-align: center;
      opacity: 0.7;
    }

    @media (max-width: 380px) {
      h1 { font-size: 24px; }
      .photo { width: 140px; height: 140px; }
      .btn { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="photo" src="profile.jpg" alt="Ankit Sunil Gupta" onerror="this.style.display='none'" />
    <h1>Ankit Sunil Gupta</h1>
    <p class="title">Business Development Manager – APAC</p>
    <p class="company">WeTransact</p>

      <a class="btn" href="mailto:Ankit.gupta@wetransact.io">

        <span class="label">

        <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </nav>

    <footer>Tap any option to connect</footer>
  </main>
</body>
</html>
